repo = 'vim-skk/skkdict.vim'

## astro.build
[[plugins]]
repo = 'wuelnerdotexe/vim-astro'

# direnv
[[plugins]]
repo = 'direnv/direnv.vim'

# Go utility
[[plugins]]
repo = 'fatih/vim-go'
on_ft = 'go'
lua_add = """
vim.g.go_doc_keywordprg_enabled = 0
vim.g.go_echo_command_info = 0
"""

# Haxe
[[plugins]]
repo = 'jdonaldson/vaxe'
on_ft = 'haxe'

# Swift
[[plugins]]
repo = 'keith/swift.vim'
on_ft = 'swift'

# Typst
[[plugins]]
repo = 'kaarmu/typst.vim'
on_ft = 'typst'

# Handlebars
[[plugins]]
repo = 'mustache/vim-mustache-handlebars'

# Idris2
[[plugins]]
repo = 'idris-community/idris2-nvim'
on_ft = 'idris2'
lua_source = 'require("idris2").setup({})'
[plugins.ftplugin]
lua_idris2 = """
vim.keymap.set("n", "<LocalLeader>cs", "<Cmd>lua require'idris2.code_action'.case_split()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>mc", "<Cmd>lua require'idris2.code_action'.make_case()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>mw", "<Cmd>lua require'idris2.code_action'.make_with()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>ml", "<Cmd>lua require'idris2.code_action'.make_lemma()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>ac", "<Cmd>lua require'idris2.code_action'.add_clause()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>es", "<Cmd>lua require'idris2.code_action'.expr_search()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>gd", "<Cmd>lua require'idris2.code_action'.generate_def()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>rh", "<Cmd>lua require'idris2.code_action'.refine_hole()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>eh", "<Cmd>lua require'idris2.code_action'.expr_search_hints()<CR>", {buffer = true})
vim.keymap.set("n", "<LocalLeader>i",  "<Cmd>lua require'idris2.code_action'.intro()<CR>", {buffer = true})
"""
