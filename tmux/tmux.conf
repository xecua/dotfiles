# C-bгҒҢгҒЎгӮҮгҒЈгҒЁжү“гҒЎгҒ«гҒҸгҒ„
set -g prefix C-q
unbind C-b
# prefix*2гҒ§tmuxеҶ…гҒ®гғ—гғӯгӮ°гғ©гғ гҒ«гҒқгӮҢгӮ’йҖҒгӮӢ
bind C-q send-prefix

# EscгӮ’жҠјгҒ—гҒҰгҒӢгӮүгҒ®гӮҝгӮӨгғ гғ©гӮ°гӮ’гҒӘгҒҸгҒ—гҒҹгҒ„гҒҢWSLгҒ§еӨүгҒӘж–Үеӯ—гҒҢеҮәгӮӢгҒ®гҒ§гҒЎгӮҮгҒЈгҒЁгҒ гҒ‘й–“гӮ’гҒӮгҒ‘гӮӢ
set -s escape-time 50

# гғ•гӮ©гғјгӮ«гӮ№гҒ«й–ўгҒҷгӮӢгӮӨгғҷгғігғҲгӮ’гғ—гғӯгӮ°гғ©гғ гҒ«дјқгҒҲгӮӢ (VimгҒ®FocusGained/FocusLostгҒӘгҒ©)
set -g focus-events on

# keep current working directory
bind c new-window -a -c '#{pane_current_path}'
# | гҒ§гғҡгӮӨгғігӮ’зёҰгҒ«еҲҶеүІгҒҷгӮӢ
bind | split-window -h -c '#{pane_current_path}'
# - гҒ§гғҡгӮӨгғігӮ’жЁӘгҒ«еҲҶеүІгҒҷгӮӢ
bind - split-window -v -c '#{pane_current_path}'

# VimгҒ®гӮӯгғјгғҗгӮӨгғігғүгҒ§гғҡгӮӨгғігӮ’з§»еӢ•гҒҷгӮӢ
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

set -g base-index 1
set -g renumber-windows on

# гғһгӮҰгӮ№ж“ҚдҪңгӮ’жңүеҠ№гҒ«гҒҷгӮӢ
set -g mouse on

# https://github.com/tmux/tmux/blob/d9d2b2f1eee0b9589406b2b7a3419fe4702d6352/key-bindings.c#L476
# https://gist.github.com/teodor440/37109df401afa03d03075df85f9aaac7
# Mouse button 3 down on status left.
bind -n MouseDown3StatusLeft display-menu -O -t= -xM -yW -T "#[align=centre]#{session_name}" \
  "Next" n "switch-client -n" \
  "Previous" p "switch-client -p" \
  "" \
  "Renumber" N "move-window -r" \
  "Rename" n "command-prompt -I \#S\ {rename-session -- "%%"}" \
  "" \
  "New Session" s "new-session" \
  "New Window" w "new-window"

# Mouse button 3 down on status line.
bind -n MouseDown3Status display-menu -O -t= -xW -yW -T "#[align=centre]#{window_index}:#{window_name}" \
  "#{?#{>:#{session_windows},1},,-}Swap Left" l "swap-window -t:-1" \
  "#{?#{>:#{session_windows},1},,-}Swap Right" r "swap-window -t:+1" \
  "#{?pane_marked_set,,-}Swap Marked" s "swap-window" \
  "" \
  "Kill" X "kill-window" \
  "Respawn" R "respawn-window -k" \
  "#{?pane_marked,Unmark,Mark}" m "select-pane -m" \
  "Rename" n "command-prompt -FI \"#W\" \"rename-window -t \"#{window_id}\" -- '%%'\"" \
  "" \
  "New After" w "new-window -a" \
  "New At End" W "new-window"

# Mouse button 3 down on pane.
bind -n MouseDown3Pane display-menu -O -t= -xM -yM -T "#[align=centre]#{pane_index} (#{pane_id})" \
  "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < "send -X history-top" \
  "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > "send -X history-bottom" \
  "" \
  "#{?#{&&:#{buffer_size},#{!:#{pane_in_mode}}},Paste #[underscore]#{=/9/...:buffer_sample},}" p "paste-buffer" \
  "" \
  "#{?mouse_word,Search For #[underscore]#{=/9/...:mouse_word},}" C-r "copy-mode -t=; send -Xt= search-backward \"#{q:mouse_word}\"" \
  "#{?mouse_word,Type #[underscore]#{=/9/...:mouse_word},}" C-y "copy-mode -q; send-keys -l -- \"#{q:mouse_word}\"" \
  "#{?mouse_word,Copy #[underscore]#{=/9/...:mouse_word},}" c "copy-mode -q; set-buffer -- \"#{q:mouse_word}\"" \
  "#{?mouse_line,Copy Line,}" l "copy-mode -q; set-buffer -- \"#{q:mouse_line}\"" \
  "" \
  "#{?mouse_hyperlink,Type #[underscore]#{=/9/...:mouse_hyperlink},}" C-h "copy-mode -q; send-keys -l -- \"#{q:mouse_hyperlink}\"" \
  "#{?mouse_hyperlink,Copy #[underscore]#{=/9/...:mouse_hyperlink},}" h "copy-mode -q; set-buffer -- \"#{q:mouse_hyperlink}\"" \
  "" \
  "Horizontal Split" h "split-window -h" \
  "Vertical Split" v "split-window -v" \
  "" \
  "#{?#{>:#{window_panes},1},,-}Swap Up" u "swap-pane -U" \
  "#{?#{>:#{window_panes},1},,-}Swap Down" d "swap-pane -D" \
  "#{?pane_marked_set,,-}Swap Marked" s "swap-pane" \
  "" \
  "Kill" X "kill-pane" \
  "Respawn" R "respawn-pane -k" \
  "#{?pane_marked,Unmark,Mark}" m "select-pane -m" \
  "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,Unzoom,Zoom}" z "resize-pane -Z"

# True ColorгӮ’жңүеҠ№гҒ«гҒҷгӮӢ
set -g default-terminal 'xterm-256color'
set -sa terminal-overrides ',xterm-256color:Tc'

# йқһгғӯгӮ°гӮӨгғігӮ·гӮ§гғ«гӮ’еј·еҲ¶
set -g default-command "${SHELL}"

# scroll buffer
set -g history-limit 65535

# status bar
set -g status-style "bg=colour238"

set -g status-left-style "fg=colour255,bg=colour238"
set -g status-left "[#S] #[fg=colour238,bg=#{?#{e|==:#{active_window_index},1},colour27,colour241}]оӮҙ "

setw -g window-status-separator ''
setw -g window-status-style "fg=colour255,bg=colour241"
setw -g window-status-current-style "default"
setw -g window-status-format "#{?window_active,#[bold bg=colour27],}#I: #T #[fg=#{?window_active,colour27,colour241} bg=#{?#{e|==:#I,#{session_windows}},colour238,#{?#{e|==:#{e|+:#I,1},#{active_window_index}},colour27,colour241}}]#{?#{||:#{window_active},#{||:#{e|==:#{e|+:#I,1},#{active_window_index}},#{e|==:#I,#{session_windows}}}},оӮҙ,оӮө} "
setw -g window-status-current-format "#{?window_active,#[bold bg=colour27],}#I: #T #[fg=#{?window_active,colour27,colour241} bg=#{?#{e|==:#I,#{session_windows}},colour238,#{?#{e|==:#{e|+:#I,1},#{active_window_index}},colour27,colour241}}]#{?#{||:#{window_active},#{||:#{e|==:#{e|+:#I,1},#{active_window_index}},#{e|==:#I,#{session_windows}}}},оӮҙ,оӮө} "

set -g status-right-length 80
set -g status-right-style "fg=colour255,bg=colour241"
set -g status-right "#[fg=colour241,bg=colour238]оӮ¶#[default] LA: #(w|head -n1|sed -E 's/.*load averages?: ([0-9,. ]+)/\\1/; s/,//g') оӮ· %Y/%m/%d %H:%M:%S"

set -g set-titles on

# гӮігғһгғігғүгғ—гғӯгғігғ—гғҲгҒ®гӮ№гӮҝгӮӨгғ«: гғҮгғ•гӮ©гғ«гғҲгҒЁеҗҢгҒҳгҒ«гҒ—гӮҲгҒҶ
set -g message-style "fg=colour255,bg=colour238"
set -g message-command-style "fg=colour255,bg=colour238"

# copy mode
setw -g mode-keys vi
# press y to copy to clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
set -g set-clipboard on

# move between prompt (OSC 133) in copy mode
bind -T copy-mode-vi [ send-keys -X previous-prompt -o
bind -T copy-mode-vi ] send-keys -X next-prompt -o
