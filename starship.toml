# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = '$all${env_var.ZMX_SESSION}$character'
add_newline = true

[character]
success_symbol = '''\(┬┤ÔêÇ`\)[INSERTÔØ»](bold green)'''
